<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>方向 A · 极简纯净（Calm）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Segoe UI', sans-serif; }
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s ease, transform .7s ease; }
    .reveal.in { opacity: 1; transform: none; }
    .card { transition: transform .35s ease, box-shadow .35s ease; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 18px 40px -20px rgba(0,0,0,.25); }
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body class="bg-white text-neutral-900 antialiased">
  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-xl border-b border-neutral-100">
    <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="#" class="text-lg font-semibold tracking-tight">MUJI<span class="text-neutral-400">STORE</span></a>
        <nav class="hidden md:flex gap-7 text-sm text-neutral-500">
          <a class="hover:text-neutral-900 transition" href="#new">新品</a>
          <a class="hover:text-neutral-900 transition" href="#hot">热销</a>
          <a class="hover:text-neutral-900 transition" href="#cat">分类</a>
        </nav>
      </div>
      <div class="flex items-center gap-5 text-neutral-700">
        <i data-lucide="search" class="w-5 h-5 cursor-pointer hover:text-neutral-900"></i>
        <i data-lucide="user" class="w-5 h-5 cursor-pointer hover:text-neutral-900"></i>
        <i data-lucide="shopping-bag" class="w-5 h-5 cursor-pointer hover:text-neutral-900"></i>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="max-w-6xl mx-auto px-5 pt-20 pb-16 text-center reveal">
    <p class="text-xs tracking-[0.3em] text-neutral-400 uppercase mb-5">2026 春夏系列</p>
    <h1 class="text-4xl md:text-6xl font-semibold tracking-tight leading-[1.1]">少即是多。<br/>为日常而设计。</h1>
    <p class="mt-6 text-neutral-500 max-w-md mx-auto text-[15px] leading-relaxed">去除多余装饰，保留真正必要的功能与质感。让每一件物品，都安静地融入生活。</p>
    <button class="mt-9 px-8 py-3 rounded-full bg-neutral-900 text-white text-sm tracking-wide hover:bg-neutral-700 transition">探索全部门类</button>
  </section>

  <!-- Categories -->
  <section id="cat" class="max-w-6xl mx-auto px-5 pb-10 reveal">
    <div class="flex flex-wrap justify-center gap-3">
      <span class="px-4 py-2 rounded-full border border-neutral-200 text-sm text-neutral-600 hover:border-neutral-900 hover:text-neutral-900 transition cursor-pointer">数码</span>
      <span class="px-4 py-2 rounded-full border border-neutral-200 text-sm text-neutral-600 hover:border-neutral-900 hover:text-neutral-900 transition cursor-pointer">家居</span>
      <span class="px-4 py-2 rounded-full border border-neutral-200 text-sm text-neutral-600 hover:border-neutral-900 hover:text-neutral-900 transition cursor-pointer">服饰</span>
      <span class="px-4 py-2 rounded-full border border-neutral-200 text-sm text-neutral-600 hover:border-neutral-900 hover:text-neutral-900 transition cursor-pointer">运动</span>
      <span class="px-4 py-2 rounded-full border border-neutral-200 text-sm text-neutral-600 hover:border-neutral-900 hover:text-neutral-900 transition cursor-pointer">餐厨</span>
    </div>
  </section>

  <!-- Product grid -->
  <section id="hot" class="max-w-6xl mx-auto px-5 pb-24">
    <h2 class="text-2xl font-semibold tracking-tight mb-8 reveal">热销精选</h2>
    <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-12"></div>
  </section>

  <footer class="border-t border-neutral-100">
    <div class="max-w-6xl mx-auto px-5 py-12 flex flex-col md:flex-row justify-between gap-8 text-sm text-neutral-500">
      <div>
        <p class="font-semibold text-neutral-900 mb-3">MUJISTORE</p>
        <p>为日常而设计。</p>
      </div>
      <div class="flex gap-16">
        <div><p class="mb-3 text-neutral-900">服务</p><p class="space-y-2"><span class="block">配送说明</span><span class="block">退换货</span><span class="block">联系我们</span></p></div>
        <div><p class="mb-3 text-neutral-900">关于</p><p class="space-y-2"><span class="block">品牌故事</span><span class="block">门店</span><span class="block">招聘</span></p></div>
      </div>
    </div>
  </footer>

  <script>
    const products = [
      { id:1, name:'降噪无线耳机', price:899, old:1299, sales:2300, img:'https://picsum.photos/seed/m1/600/600' },
      { id:2, name:'智能手表 Pro', price:1499, old:1799, sales:1200, img:'https://picsum.photos/seed/m2/600/600' },
      { id:3, name:'极简双肩背包', price:299, old:459, sales:5400, img:'https://picsum.photos/seed/m3/600/600' },
      { id:4, name:'便携咖啡机', price:599, old:799, sales:880, img:'https://picsum.photos/seed/m4/600/600' },
      { id:5, name:'机械键盘 87 键', price:449, old:599, sales:3100, img:'https://picsum.photos/seed/m5/600/600' },
      { id:6, name:'香薰加湿器', price:199, old:259, sales:6700, img:'https://picsum.photos/seed/m6/600/600' },
      { id:7, name:'运动跑鞋', price:499, old:699, sales:2200, img:'https://picsum.photos/seed/m7/600/600' },
      { id:8, name:'陶瓷餐具套装', price:259, old:359, sales:1500, img:'https://picsum.photos/seed/m8/600/600' },
    ]
    const grid = document.getElementById('grid')
    grid.innerHTML = products.map(p => `
      <a href="#" class="card group block reveal">
        <div class="aspect-square bg-neutral-50 rounded-2xl overflow-hidden mb-4">
          <img src="${p.img}" alt="${p.name}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
        </div>
        <h3 class="text-[15px] font-medium text-neutral-900">${p.name}</h3>
        <div class="mt-1 flex items-baseline gap-2">
          <span class="text-neutral-900 font-semibold">¥${p.price}</span>
          <span class="text-neutral-400 text-xs line-through">¥${p.old}</span>
        </div>
        <p class="mt-1 text-xs text-neutral-400">已售 ${p.sales}</p>
      </a>`).join('')
    lucide.createIcons()
    const io = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('in')), { threshold:.1 })
    document.querySelectorAll('.reveal').forEach(el => io.observe(el))
  </script>
</body>
</html>
